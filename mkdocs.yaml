site_name: Lilya Converter
site_description: Convert your existing FastAPI projects into Lilya with deterministic, report-driven workflows.
site_url: https://lilya-converter.dymmond.com
docs_dir: docs/generated
site_dir: site
theme:
  name: material
  language: en
  icon:
    logo: lucide/sparkles
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      media: '(prefers-color-scheme: light)'
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      media: '(prefers-color-scheme: dark)'
      toggle:
        icon: lucide/moon
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - search.highlight
    - content.code.copy
    - content.tabs.link
repo_name: dymmond/lilya-converter
repo_url: https://github.com/dymmond/lilya-converter
edit_uri: ''
plugins:
  - search
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Get Started: get-started.md
  - Tutorial - First Conversion: tutorial-first-conversion.md
  - How-To Guides:
      - Convert an Entire Project: how-to-convert-project.md
      - Convert a Single File: how-to-convert-single-file.md
      - Analyze and Reports: how-to-analyze-and-reports.md
      - Verify and Fix Issues: how-to-verify-and-fix.md
  - Command Reference: commands.md
  - Conversion Rules: conversion-rules.md
  - Contributing: contributing.md
  - Release Notes: release-notes.md
  - Sponsorship: sponsorship.md
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
